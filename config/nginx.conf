upstream frappe_backend {
    server backend:8000;
}

upstream frappe_websocket {
    server websocket:9000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # Static files
    location /assets {
        alias /home/frappe/frappe-bench/sites/assets;
        try_files $uri =404;
    }

    # Site files
    location /files {
        root /home/frappe/frappe-bench/sites;
        try_files /$host/public/$uri @backend;
    }

    # Websocket
    location /socket.io {
        proxy_pass http://frappe_websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Main app
    location / {
        proxy_pass http://frappe_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
    }
}
