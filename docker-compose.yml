version: "3.8"

services:

  # -------------------------------------------------------
  # MariaDB
  # -------------------------------------------------------
  mariadb:
    image: mariadb:10.6
    container_name: frappe_mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-changeme_root_password}
      MYSQL_DATABASE: frappe
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./config/mariadb.cnf:/etc/mysql/conf.d/frappe.cnf:ro
    networks:
      - frappe-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MARIADB_ROOT_PASSWORD:-changeme_root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # Redis Cache
  # -------------------------------------------------------
  redis-cache:
    image: redis:7-alpine
    container_name: frappe_redis_cache
    restart: unless-stopped
    networks:
      - frappe-net

  # -------------------------------------------------------
  # Redis Queue
  # -------------------------------------------------------
  redis-queue:
    image: redis:7-alpine
    container_name: frappe_redis_queue
    restart: unless-stopped
    networks:
      - frappe-net

  # -------------------------------------------------------
  # Backend (bench / frappe)
  # -------------------------------------------------------
  backend:
    image: ${CUSTOM_IMAGE:-frappe-erpnext-custom}:${CUSTOM_TAG:-v15}
    container_name: frappe_backend
    restart: unless-stopped
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - REDIS_CACHE=redis-cache:6379
      - REDIS_QUEUE=redis-queue:6379
      - FRAPPE_SITE_NAME_HEADER=${SITE_NAME:-site1.local}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - frappe-net
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started

  # -------------------------------------------------------
  # Scheduler
  # -------------------------------------------------------
  scheduler:
    image: ${CUSTOM_IMAGE:-frappe-erpnext-custom}:${CUSTOM_TAG:-v15}
    container_name: frappe_scheduler
    restart: unless-stopped
    command: bench schedule
    environment:
      - REDIS_QUEUE=redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - frappe-net
    depends_on:
      - backend

  # -------------------------------------------------------
  # Worker Short
  # -------------------------------------------------------
  worker-short:
    image: ${CUSTOM_IMAGE:-frappe-erpnext-custom}:${CUSTOM_TAG:-v15}
    container_name: frappe_worker_short
    restart: unless-stopped
    command: bench worker --queue short,default
    environment:
      - REDIS_QUEUE=redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - frappe-net
    depends_on:
      - backend

  # -------------------------------------------------------
  # Worker Long
  # -------------------------------------------------------
  worker-long:
    image: ${CUSTOM_IMAGE:-frappe-erpnext-custom}:${CUSTOM_TAG:-v15}
    container_name: frappe_worker_long
    restart: unless-stopped
    command: bench worker --queue long,default
    environment:
      - REDIS_QUEUE=redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - frappe-net
    depends_on:
      - backend

  # -------------------------------------------------------
  # Websocket
  # -------------------------------------------------------
  websocket:
    image: ${CUSTOM_IMAGE:-frappe-erpnext-custom}:${CUSTOM_TAG:-v15}
    container_name: frappe_websocket
    restart: unless-stopped
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      - REDIS_CACHE=redis-cache:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - logs:/home/frappe/frappe-bench/logs
    networks:
      - frappe-net
    depends_on:
      - backend

  # -------------------------------------------------------
  # Nginx (frontend)
  # -------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: frappe_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - frappe-net
    depends_on:
      - backend
      - websocket

volumes:
  mariadb-data:
  sites:
  logs:

networks:
  frappe-net:
    driver: bridge
